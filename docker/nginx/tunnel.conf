proxy_cache_path /var/cache/nginx/kgm levels=1:2 keys_zone=kgm_catalog_cache:512m max_size=12g inactive=90m use_temp_path=off;
proxy_cache_key "$scheme$request_method$host$request_uri";
limit_req_zone $binary_remote_addr zone=kgm_api_ip:20m rate=30r/s;
limit_req_zone $binary_remote_addr zone=kgm_payment_ip:10m rate=2r/s;
limit_conn_zone $binary_remote_addr zone=kgm_conn_ip:20m;
resolver 127.0.0.11 valid=10s ipv6=off;
resolver_timeout 2s;

map $http_origin $kgm_cors_origin {
    default "";
    "https://karacabeygrossmarket.com" $http_origin;
    "https://www.karacabeygrossmarket.com" $http_origin;
    "https://panel.karacabeygrossmarket.com" $http_origin;
}

map $host $kgm_next_endpoint { default http://next-web:3000; }
map $host $kgm_php_endpoint { default php-admin:9000; }
map $host $kgm_mail_service_endpoint { default http://kgm-mail-service:8088; }

server {
    listen 80;
    server_name api.karacabeygrossmarket.com;
    set $kgm_go_api_endpoint http://go-api:8080;
    client_max_body_size 2m;
    keepalive_timeout 75s;
    limit_conn kgm_conn_ip 80;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    error_page 502 503 504 = @api_unavailable;

    location /internal/ { return 404; }

    location @api_unavailable {
        default_type application/json;
        add_header Access-Control-Allow-Origin $kgm_cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Cart-Token, X-Checkout-Key, X-Payment-UID, X-Customer-UID, X-Session-UID, X-Request-ID, X-Device-Id, X-App-Version, X-Platform, X-Idempotency-Key, X-Action-Token, X-Action-Token-Status" always;
        add_header Access-Control-Allow-Methods "GET, POST, PATCH, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Max-Age 600 always;
        add_header Access-Control-Expose-Headers "X-Request-ID, X-Customer-UID, X-Session-UID, X-Cart-Token, X-Customer-Sync-Version, X-Idempotency-Key, X-Action-Token, X-Action-Token-Status" always;
        if ($request_method = OPTIONS) {
            return 204;
        }
        return 503 '{"message":"API gecici olarak kullanilamiyor.","code":503,"status":"Service Unavailable"}';
    }

    location = /healthz { proxy_pass $kgm_go_api_endpoint; proxy_http_version 1.1; proxy_set_header Connection ""; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto https; }
    location = /readyz { proxy_pass $kgm_go_api_endpoint; proxy_http_version 1.1; proxy_set_header Connection ""; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto https; }

    location @cart_read_fallback {
        default_type application/json;
        add_header Access-Control-Allow-Origin $kgm_cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Expose-Headers "X-Request-ID, X-Customer-UID, X-Session-UID, X-Cart-Token, X-Customer-Sync-Version, X-Idempotency-Key, X-Action-Token, X-Action-Token-Status" always;
        if ($request_method != GET) {
            return 503 '{"message":"API gecici olarak kullanilamiyor.","code":503,"status":"Service Unavailable"}';
        }
        return 200 '{"cart_token":null,"items":[],"applied_coupon":null,"subtotal_cents":0,"total_cents":0}';
    }

    location @sync_state_fallback {
        default_type application/json;
        add_header Access-Control-Allow-Origin $kgm_cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Expose-Headers "X-Request-ID, X-Customer-UID, X-Session-UID, X-Cart-Token, X-Customer-Sync-Version, X-Idempotency-Key, X-Action-Token, X-Action-Token-Status" always;
        return 200 '{"data":{"identity":{"customer_uid":"","session_uid":"","source":"nginx-fallback"},"client_version":0,"server_version":0,"has_changes":false,"server_at":"1970-01-01T00:00:00Z"}}';
    }

    location = /api/v1/tracking/events {
        default_type application/json;
        add_header Access-Control-Allow-Origin $kgm_cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Cart-Token, X-Customer-UID, X-Session-UID, X-Request-ID" always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Max-Age 600 always;
        if ($request_method = OPTIONS) { return 204; }
        return 202 '{"data":{"accepted":true,"stored":false,"reason":"edge_tracking_fallback"}}';
    }

    location = /api/v1/tracking/consent {
        default_type application/json;
        add_header Access-Control-Allow-Origin $kgm_cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Cart-Token, X-Customer-UID, X-Session-UID, X-Request-ID" always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Max-Age 600 always;
        if ($request_method = OPTIONS) { return 204; }
        return 202 '{"data":{"accepted":true,"stored":false,"reason":"edge_consent_fallback"}}';
    }

    location = /api/v1/cart {
        limit_req zone=kgm_api_ip burst=180 nodelay;
        add_header Access-Control-Allow-Origin $kgm_cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Cart-Token, X-Checkout-Key, X-Payment-UID, X-Customer-UID, X-Session-UID, X-Request-ID, X-Device-Id, X-App-Version, X-Platform, X-Idempotency-Key, X-Action-Token, X-Action-Token-Status" always;
        add_header Access-Control-Allow-Methods "GET, POST, PATCH, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Max-Age 600 always;
        add_header Access-Control-Expose-Headers "X-Request-ID, X-Customer-UID, X-Session-UID, X-Cart-Token, X-Customer-Sync-Version, X-Idempotency-Key, X-Action-Token, X-Action-Token-Status" always;
        if ($request_method = OPTIONS) { return 204; }
        error_page 502 503 504 = @cart_read_fallback;
        proxy_intercept_errors on;
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Expose-Headers;
        proxy_hide_header Access-Control-Expose-Headers;
        proxy_hide_header Access-Control-Max-Age;
        proxy_pass $kgm_go_api_endpoint;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 2s;
        proxy_read_timeout 8s;
        proxy_send_timeout 8s;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    location = /api/v1/customer/sync-state {
        limit_req zone=kgm_api_ip burst=180 nodelay;
        add_header Access-Control-Allow-Origin $kgm_cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Cart-Token, X-Checkout-Key, X-Payment-UID, X-Customer-UID, X-Session-UID, X-Request-ID, X-Device-Id, X-App-Version, X-Platform, X-Idempotency-Key, X-Action-Token, X-Action-Token-Status" always;
        add_header Access-Control-Allow-Methods "GET, POST, PATCH, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Max-Age 600 always;
        add_header Access-Control-Expose-Headers "X-Request-ID, X-Customer-UID, X-Session-UID, X-Cart-Token, X-Customer-Sync-Version, X-Idempotency-Key, X-Action-Token, X-Action-Token-Status" always;
        if ($request_method = OPTIONS) { return 204; }
        error_page 502 503 504 = @sync_state_fallback;
        proxy_intercept_errors on;
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Expose-Headers;
        proxy_hide_header Access-Control-Expose-Headers;
        proxy_hide_header Access-Control-Max-Age;
        proxy_pass $kgm_go_api_endpoint;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 2s;
        proxy_read_timeout 8s;
        proxy_send_timeout 8s;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    location ~ ^/api/v1/(products|categories|content|mobile/bootstrap) {
        limit_req zone=kgm_api_ip burst=120 nodelay;
        proxy_pass $kgm_go_api_endpoint;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 3s;
        proxy_read_timeout 20s;
        proxy_send_timeout 20s;
        proxy_cache kgm_catalog_cache;
        proxy_cache_valid 200 60s;
        proxy_cache_valid 404 15s;
        proxy_cache_lock on;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_ignore_headers Set-Cookie;
        proxy_hide_header Set-Cookie;
        add_header X-Proxy-Cache $upstream_cache_status always;
    }

    location ~ ^/api/(v1/c|cb/p) {
        limit_req zone=kgm_payment_ip burst=8 nodelay;
        proxy_pass $kgm_go_api_endpoint;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        proxy_read_timeout 35s;
    }

    location /api/ {
        limit_req zone=kgm_api_ip burst=180 nodelay;
        proxy_pass $kgm_go_api_endpoint;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 3s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }
}

server {
    listen 80;
    server_name cdn.karacabeygrossmarket.com;
    root /var/www/html/public;
    access_log off;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    add_header X-Content-Type-Options nosniff always;

    location ~* \.map$ { return 404; }
    location /storage/ { alias /var/www/html/storage/; }
    location /assets/ { try_files $uri =404; }
    location /_next/static/ { proxy_pass $kgm_next_endpoint; proxy_http_version 1.1; proxy_set_header Host $host; add_header Cache-Control "public, max-age=31536000, immutable" always; }
}

server {
    listen 80;
    server_name panel.karacabeygrossmarket.com;
    root /var/www/html/public;
    index index.php;
    client_max_body_size 32m;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    location /storage/ { alias /var/www/html/storage/; }
    location = / { return 302 https://panel.karacabeygrossmarket.com/admin/login; }
    location / { try_files $uri $uri/ /index.php?$query_string; }
    location ~ \.php$ { include fastcgi_params; fastcgi_pass $kgm_php_endpoint; fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name; fastcgi_param HTTPS on; fastcgi_param HTTP_X_FORWARDED_PROTO https; fastcgi_read_timeout 90s; }
    location ~ /\. { deny all; }
}

server {
    listen 80;
    server_name webmail.karacabeygrossmarket.com;
    client_max_body_size 2m;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-Robots-Tag "noindex, nofollow" always;

    error_page 401 403 = @mail_admin_login;

    location = /__kgm_mail_admin_auth {
        internal;
        root /var/www/html/public;
        include fastcgi_params;
        fastcgi_pass $kgm_php_endpoint;
        fastcgi_pass_request_body off;
        fastcgi_param CONTENT_LENGTH "";
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param REQUEST_URI /internal/mail-auth/check;
        fastcgi_param REQUEST_METHOD GET;
        fastcgi_param QUERY_STRING "";
        fastcgi_param HTTPS on;
        fastcgi_param HTTP_HOST panel.karacabeygrossmarket.com;
        fastcgi_param HTTP_COOKIE $http_cookie;
        fastcgi_param HTTP_X_ORIGINAL_HOST $host;
        fastcgi_param HTTP_X_ORIGINAL_URI $request_uri;
        fastcgi_param HTTP_X_MAIL_ADMIN_TOKEN $http_x_mail_admin_token;
        fastcgi_param HTTP_X_REAL_IP $remote_addr;
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
    }

    location @mail_admin_login {
        return 302 https://panel.karacabeygrossmarket.com/admin/login;
    }

    location @mail_api_unauthorized {
        default_type application/json;
        return 401 '{"message":"Mail admin oturumu gerekli.","code":401}';
    }

    # /api/* — JSON; auth fail durumunda 401 JSON dön (panel'e redirect yapma)
    location ^~ /api/ {
        auth_request /__kgm_mail_admin_auth;
        auth_request_set $mail_admin_token $upstream_http_x_kgm_mail_admin_token;
        error_page 401 403 = @mail_api_unauthorized;

        proxy_pass $kgm_mail_service_endpoint;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Mail-Admin-Token $mail_admin_token;
        proxy_read_timeout 30s;
    }

    # / — UI; auth fail durumunda panel login'e redirect (server-level error_page)
    location / {
        auth_request /__kgm_mail_admin_auth;
        auth_request_set $mail_admin_token $upstream_http_x_kgm_mail_admin_token;

        proxy_pass $kgm_mail_service_endpoint;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Mail-Admin-Token $mail_admin_token;
        proxy_read_timeout 30s;
    }
}

server {
    listen 80;
    server_name karacabeygrossmarket.com www.karacabeygrossmarket.com;
    root /var/www/html/public;
    location ~* \.map$ { return 404; }

    location @next_chunk_missing {
        default_type application/javascript;
        add_header Cache-Control "no-store, max-age=0" always;
        return 200 '(()=>{try{var k="kgm_chunk_reload_at";var n=Date.now();var p=Number(sessionStorage.getItem(k)||0);if(n-p>30000){sessionStorage.setItem(k,String(n));location.reload();}}catch(e){location.reload();}})();';
    }

    location ^~ /_next/_next/static/chunks/ {
        rewrite ^/_next/_next/static/(.*)$ /_next/static/$1 break;
        proxy_intercept_errors on;
        error_page 404 500 502 503 504 = @next_chunk_missing;
        proxy_pass $kgm_next_endpoint;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location ^~ /_next/static/chunks/ {
        proxy_intercept_errors on;
        error_page 404 500 502 503 504 = @next_chunk_missing;
        proxy_pass $kgm_next_endpoint;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location ^~ /_next/_next/static/ {
        rewrite ^/_next/_next/static/(.*)$ /_next/static/$1 break;
        proxy_pass $kgm_next_endpoint;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location ^~ /_next/static/ {
        proxy_pass $kgm_next_endpoint;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location = /feed/google-merchant.xml { return 301 /google-merchant.xml; }
    location = /feed/facebook-catalog.xml { return 301 /google-merchant.xml; }

    # Legacy Google Merchant Center / Facebook Catalog feed (PHP)
    location ^~ /feed/ {
        try_files $uri /index.php?$query_string;
    }
    location ^~ /seo/ {
        alias /var/www/html/public/seo/;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=900" always;
    }
    location ~ ^/feed/.*\.php$ { return 404; }
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass $kgm_php_endpoint;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS on;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
        fastcgi_read_timeout 60s;
    }

    location / { proxy_pass $kgm_next_endpoint; proxy_http_version 1.1; proxy_set_header Connection ""; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto https; }
}
