server {
    listen 80;
    server_name webmail.karacabeygrossmarket.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name webmail.karacabeygrossmarket.com;

    # certbot ile üretildikten sonra aktif et:
    # ssl_certificate /etc/letsencrypt/live/mail.karacabeygrossmarket.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/mail.karacabeygrossmarket.com/privkey.pem;

    client_max_body_size 4m;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy same-origin always;
    add_header X-Frame-Options DENY always;

    location / {
        proxy_pass http://127.0.0.1:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
